<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Recipe Book</title>
  <style>
    :root {
      --bg: #2e3d2f;
      --panel: #d7d2bd;
      --ink: #1f1c16;
      --line: #355447;
      --heading-bg: #a9d5db;
      --heading-ink: #b42558;
      --muted: #4b3d36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "JetBrains Mono", ui-monospace, monospace;
      padding: 12px;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }
    .head {
      background: var(--heading-bg);
      color: var(--heading-ink);
      border: 2px solid var(--heading-ink);
      border-radius: 8px;
      padding: 10px;
    }
    .head h1 {
      margin: 0;
      font-size: 1.1rem;
    }
    .head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .toolbar {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    #q {
      width: 100%;
      font: inherit;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #f2efdf;
      color: var(--ink);
    }
    #count {
      font-size: 0.9rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .list {
      display: grid;
      gap: 8px;
    }
    .flags {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .flags h2 {
      margin: 0;
      font-size: 1rem;
    }
    .flag {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #f2efdf;
      display: grid;
      gap: 4px;
    }
    .recipe {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 6px;
    }
    .items {
      background: var(--panel);
      border: 2px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 8px;
    }
    .items h2 {
      margin: 0;
      font-size: 1rem;
    }
    .item-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .item-card {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #f2efdf;
      display: grid;
      gap: 5px;
    }
    .item-title {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .ascii {
      margin: 0;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      line-height: 1;
      font-size: 10px;
      padding: 6px;
      border: 1px solid #ccb;
      background: #ece7d2;
      white-space: pre;
      overflow-x: auto;
    }
    .muted {
      color: var(--muted);
    }
    .r-top {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.8rem;
      background: #f2efdf;
    }
    .id {
      font-weight: 700;
      font-size: 0.95rem;
    }
    .line {
      font-size: 0.9rem;
      white-space: pre-wrap;
    }
    .k {
      color: var(--muted);
    }
    code {
      background: #ece7d2;
      border: 1px solid #ccb;
      border-radius: 4px;
      padding: 0 4px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="head">
      <h1>Recipe Book</h1>
      <p>All crafting and action recipes currently in the game.</p>
    </section>

    <section class="toolbar">
      <input id="q" placeholder="Filter by id, action, item name, text..." />
      <div id="count"></div>
    </section>

    <section id="list" class="list"></section>
    <section class="flags">
      <h2>Flags & Effects</h2>
      <div id="flagList"></div>
    </section>
    <section class="items">
      <h2>Items</h2>
      <div id="itemList" class="item-grid"></div>
    </section>
  </div>

  <script src="items.js"></script>
  <script src="recipes.js"></script>
  <script>
    (function () {
      const listEl = document.getElementById("list");
      const qEl = document.getElementById("q");
      const countEl = document.getElementById("count");
      const flagListEl = document.getElementById("flagList");
      const itemListEl = document.getElementById("itemList");

      function itemLabel(id) {
        if (!id) return "(none)";
        const def = (typeof ITEM_DEFS !== "undefined") ? ITEM_DEFS[id] : null;
        return def ? `${def.emoji || ""} ${def.name}`.trim() : id;
      }

      function labels(ids) {
        const arr = Array.isArray(ids) ? ids.filter(Boolean) : [];
        if (!arr.length) return "(nothing)";
        return arr.map(itemLabel).join(", ");
      }

      function classify(recipe) {
        if (recipe && recipe.action) return "Action";
        return "Combine";
      }

      function primaryLine(recipe) {
        if (recipe.action) {
          const req = Array.isArray(recipe.requires) && recipe.requires.length
            ? ` (needs ${labels(recipe.requires)})`
            : "";
          return `${recipe.action} ${itemLabel(recipe.target)}${req}`;
        }
        return `${labels(recipe.inputs)} → ${labels(recipe.produce)}`;
      }

      function normalizeRecipes() {
        if (typeof RECIPES === "undefined") return [];
        return Object.entries(RECIPES).map(([id, recipe]) => ({
          id,
          recipe,
          type: classify(recipe),
          line: primaryLine(recipe),
          searchBlob: [
            id,
            recipe.action || "",
            labels(recipe.inputs),
            itemLabel(recipe.target),
            labels(recipe.requires),
            labels(recipe.consume),
            labels(recipe.produce),
            recipe.text || "",
            recipe.missingRequiresText || "",
            recipe.repeatText || "",
            recipe.successSfx || "",
            recipe.setFlag || "",
          ].join(" ").toLowerCase(),
        }));
      }

      const rows = normalizeRecipes();
      const FLAG_EFFECTS = Object.freeze({
        grateKeyTaken: "Marks the grate key as taken so grate-related descriptions/puzzle state update.",
        fireOut: "Douses the campfire, removes the inspector barrier at Mine Entrance east exit, and relocates the inspector to Dark Forest (one-time).",
        fridgeOpened: "Marks fridge as opened so open-fridge recipe uses repeat behavior instead of spawning another item.",
        bedBookFound: "Marks the hidden bed book as found so repeated searches/examines don't reveal it again.",
        timeForward1000: "Advances time 1000 years and turns Seed into Corn in Mine Field (MINE_CAVERN).",
        eggOilExperimentReady: "Completes the egg+oil setup, removes Einstein Barman's south-exit barrier, and moves/places him in the tavern.",
      });

      function recipeCard(row) {
        const r = row.recipe;
        const parts = [];
        parts.push(`<div class="r-top"><span class="id">${row.id}</span><span class="badge">${row.type}</span></div>`);
        parts.push(`<div class="line"><span class="k">Recipe:</span> ${row.line}</div>`);
        if (Array.isArray(r.inputs)) parts.push(`<div class="line"><span class="k">Inputs:</span> ${labels(r.inputs)}</div>`);
        if (r.action) parts.push(`<div class="line"><span class="k">Action Target:</span> ${itemLabel(r.target)}</div>`);
        if (Array.isArray(r.requires) && r.requires.length) parts.push(`<div class="line"><span class="k">Requires:</span> ${labels(r.requires)}</div>`);
        if (Array.isArray(r.consume)) parts.push(`<div class="line"><span class="k">Consumes:</span> ${labels(r.consume)}</div>`);
        if (Array.isArray(r.produce)) parts.push(`<div class="line"><span class="k">Produces:</span> ${labels(r.produce)}</div>`);
        if (r.placeResult) parts.push(`<div class="line"><span class="k">Place Result:</span> <code>${r.placeResult}</code></div>`);
        if (r.keepCoord) parts.push(`<div class="line"><span class="k">Keep Coords:</span> <code>true</code></div>`);
        if (r.successSfx) parts.push(`<div class="line"><span class="k">SFX:</span> <code>${r.successSfx}</code></div>`);
        if (r.text) parts.push(`<div class="line"><span class="k">Success Text:</span> ${r.text}</div>`);
        if (r.missingRequiresText) parts.push(`<div class="line"><span class="k">Missing Text:</span> ${r.missingRequiresText}</div>`);
        if (r.repeatText) parts.push(`<div class="line"><span class="k">Repeat Text:</span> ${r.repeatText}</div>`);

        return `<article class="recipe">${parts.join("")}</article>`;
      }

      function render() {
        const q = qEl.value.trim().toLowerCase();
        const filtered = q ? rows.filter((r) => r.searchBlob.includes(q)) : rows;
        countEl.textContent = `${filtered.length} / ${rows.length} recipes`;
        listEl.innerHTML = filtered.map(recipeCard).join("");
      }

      function renderFlags() {
        const byFlag = new Map();
        for (const row of rows) {
          const f = row.recipe?.setFlag;
          if (!f) continue;
          if (!byFlag.has(f)) byFlag.set(f, []);
          byFlag.get(f).push(row.id);
        }

        const flags = Array.from(byFlag.keys()).sort();
        if (!flags.length) {
          flagListEl.innerHTML = `<div class="line">No recipe flags found.</div>`;
          return;
        }

        flagListEl.innerHTML = flags.map((flag) => {
          const recipeIds = byFlag.get(flag) || [];
          const effect = FLAG_EFFECTS[flag] || "Used as a state marker for recipe/room condition checks.";
          return `
            <article class="flag">
              <div class="line"><span class="k">Flag:</span> <code>${flag}</code></div>
              <div class="line"><span class="k">Set by:</span> ${recipeIds.map((id) => `<code>${id}</code>`).join(", ")}</div>
              <div class="line"><span class="k">Effect:</span> ${effect}</div>
            </article>
          `;
        }).join("");
      }

      function boolOrMissing(v) {
        return typeof v === "boolean" ? String(v) : "(unset)";
      }

      function asCode(v) {
        return `<code>${String(v)}</code>`;
      }

      function renderItems() {
        const defs = (typeof ITEM_DEFS !== "undefined") ? Object.values(ITEM_DEFS) : [];
        const sorted = [...defs].sort((a, b) => String(a?.id || "").localeCompare(String(b?.id || "")));
        const itemToFlags = new Map();

        for (const row of rows) {
          const flag = row.recipe?.setFlag;
          if (!flag) continue;

          const touched = new Set();
          const r = row.recipe || {};
          const arrays = [r.inputs, r.requires, r.consume, r.produce];
          for (const arr of arrays) {
            if (!Array.isArray(arr)) continue;
            for (const id of arr) if (id) touched.add(id);
          }
          if (r.target) touched.add(r.target);

          for (const id of touched) {
            if (!itemToFlags.has(id)) itemToFlags.set(id, new Set());
            itemToFlags.get(id).add(flag);
          }
        }

        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        itemListEl.innerHTML = sorted.map((d) => {
          const syn = Array.isArray(d.synonyms) && d.synonyms.length ? d.synonyms.join(", ") : "(none)";
          const ascii = Array.isArray(d.asciiTile) ? d.asciiTile.join("\n") : "(no asciiTile)";
          const asciiHtml = esc(ascii);
          const colorStyle = d.mapColor ? ` style="color:${d.mapColor}"` : "";
          const flags = itemToFlags.has(d.id) ? Array.from(itemToFlags.get(d.id)).sort() : [];
          const flagText = flags.length ? flags.map((f) => `<code>${f}</code>`).join(", ") : '<span class="muted">(none)</span>';

          return `
            <article class="item-card">
              <div class="item-title">${d.emoji || ""} ${d.name || d.id || "(unnamed item)"}</div>
              <div class="line"><span class="k">ID:</span> ${asCode(d.id || "(missing)")}</div>
              <div class="line"><span class="k">Map Color:</span> ${asCode(d.mapColor || "(none)")}</div>
              <div class="line"><span class="k">Visible:</span> ${asCode(boolOrMissing(d.visible))} <span class="k">Portable:</span> ${asCode(boolOrMissing(d.portable))}</div>
              <div class="line"><span class="k">Synonyms:</span> ${syn}</div>
              <div class="line"><span class="k">Flags Affecting:</span> ${flagText}</div>
              <div class="line"><span class="k">Examine:</span> ${d.examine || "(none)"}</div>
              ${d.takeText ? `<div class="line"><span class="k">takeText:</span> ${d.takeText}</div>` : ""}
              ${d.eatText ? `<div class="line"><span class="k">eatText:</span> ${d.eatText}</div>` : ""}
              <pre class="ascii"${colorStyle}>${asciiHtml}</pre>
            </article>
          `;
        }).join("");
      }

      qEl.addEventListener("input", render);
      render();
      renderFlags();
      renderItems();
    })();
  </script>
</body>
</html>
