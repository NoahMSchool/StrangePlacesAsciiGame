<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A Strange Character It Is (ASCII)</title>
  <link rel="stylesheet" href="neat_style.css">
</head>
<body>
  <div class="neatApp">
    <div class="neatHeader">
      <h1>A Strange Character Is In (ASCII)</h1>
      <div id="status"></div>
    </div>

    <div class="workspace">
      <div class="leftPane">
        <div id="inputBox"></div>
        <div class="controls">
          <input id="cmd" placeholder="Type anything..." disabled />
          <button id="send" type="button" title="Send command" aria-label="Send command" disabled>Send</button>
          <button id="helpBtn" type="button" title="Help" aria-label="Help">Help</button>
          <button id="bgmToggle" type="button" title="Music" aria-label="Music">Music</button>
          <button id="sfxToggle" type="button" title="Sound effects" aria-label="Sound effects">FX</button>
        </div>
      </div>

      <div class="rightPane" aria-label="ASCII panel">
        <div id="mapSquare">
          <pre id="asciiOutput"></pre>
        </div>
        <div id="roomName"></div>
      </div>
    </div>
  </div>

  <script>
    window.START_ROOM = "DARKFOREST";
  </script>

  <script src="items.js"></script>
  <script src="recipes.js"></script>
  <script src="rooms.js"></script>
  <script src="parser.js"></script>
  <script src="sounds.js"></script>
  <script src="game_core.js"></script>
  <script src="game_commands.js"></script>
  <script src="ascii.js"></script>

  <script>
    const inputBox = document.getElementById("inputBox");
    const status = document.getElementById("status");
    const cmd = document.getElementById("cmd");
    const sendBtn = document.getElementById("send");
    const helpBtn = document.getElementById("helpBtn");
    const bgmToggleBtn = document.getElementById("bgmToggle");
    const sfxToggleBtn = document.getElementById("sfxToggle");
    const roomNameEl = document.getElementById("roomName");
    const asciiOutputEl = document.getElementById("asciiOutput");
    const rightPaneEl = document.querySelector(".rightPane");
    const mapSquareEl = document.getElementById("mapSquare");

    function say(t) {
      inputBox.textContent += t + "\n";
      inputBox.scrollTop = inputBox.scrollHeight;
    }

    function setStatus(t) {
      status.textContent = t || "";
    }

    function updateAudioToggleLabels() {
      const bgmOn =
        window.GameRuntime &&
        typeof GameRuntime.getBgmEnabled === "function" &&
        GameRuntime.getBgmEnabled();
      const sfxOn =
        window.GameRuntime &&
        typeof GameRuntime.getSfxEnabled === "function" &&
        GameRuntime.getSfxEnabled();

      bgmToggleBtn.textContent = bgmOn ? "Music" : "Muted";
      sfxToggleBtn.textContent = sfxOn ? "FX" : "FX Off";
      bgmToggleBtn.title = bgmOn ? "Music on" : "Music off";
      sfxToggleBtn.title = sfxOn ? "FX on" : "FX off";
    }

    function getAsciiDims(text) {
      const lines = String(text || "").split("\n");
      const rows = Math.max(1, lines.length);
      let cols = 1;
      for (const line of lines) cols = Math.max(cols, line.length);
      return { rows, cols };
    }

    function measureCharAt16Px() {
      const probe = document.createElement("span");
      probe.textContent = "M";
      probe.style.position = "absolute";
      probe.style.visibility = "hidden";
      probe.style.pointerEvents = "none";
      probe.style.fontFamily = getComputedStyle(asciiOutputEl).fontFamily;
      probe.style.fontSize = "16px";
      probe.style.lineHeight = "1";
      document.body.appendChild(probe);
      const rect = probe.getBoundingClientRect();
      document.body.removeChild(probe);
      return {
        width: Math.max(1, rect.width),
        height: Math.max(1, rect.height),
      };
    }

    function sizeMapSquare() {
      const roomNameH = roomNameEl.getBoundingClientRect().height || 0;
      const gap = 8;
      const innerW = Math.max(1, rightPaneEl.clientWidth);
      const innerH = Math.max(1, rightPaneEl.clientHeight - roomNameH - gap);
      const side = Math.max(40, Math.floor(Math.min(innerW, innerH)));
      mapSquareEl.style.width = `${side}px`;
      mapSquareEl.style.height = `${side}px`;
    }

    function fitAsciiToMapSquare() {
      const text = asciiOutputEl.textContent || "";
      const { rows, cols } = getAsciiDims(text);
      const availableW = Math.max(1, mapSquareEl.clientWidth - 8);
      const availableH = Math.max(1, mapSquareEl.clientHeight - 8);
      const char16 = measureCharAt16Px();

      const pxByWidth = (availableW * 16) / (cols * char16.width);
      const pxByHeight = (availableH * 16) / (rows * char16.height);
      const next = Math.max(4, Math.floor(Math.min(pxByWidth, pxByHeight)));
      asciiOutputEl.style.fontSize = `${next}px`;
    }

    async function updateRoomTile() {
      const room = GameRuntime.getCurrentRoom();
      if (typeof getRoomTileHtml === "function") {
        asciiOutputEl.innerHTML = getRoomTileHtml(room);
      } else {
        asciiOutputEl.textContent = getRoomTile(room);
      }
      roomNameEl.textContent = room?.name || "";
      sizeMapSquare();
      fitAsciiToMapSquare();
    }

    async function run() {
      const text = cmd.value.trim();
      if (!text) return;

      setStatus("");
      const reply = parseCommands(text);
      GameRuntime.executeParseResult(reply, say);

      cmd.value = "";
      say("");
      cmd.focus();
      updateRoomTile();
    }

    async function runRawCommand(text) {
      if (!text) return;
      setStatus("");
      const reply = parseCommands(text);
      GameRuntime.executeParseResult(reply, say);
      say("");
      updateRoomTile();
    }

    function directionFromAsciiGapTap(clientX, clientY) {
      const rect = asciiOutputEl.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;

      const relX = Math.max(0, Math.min(rect.width - 1, clientX - rect.left));
      const relY = Math.max(0, Math.min(rect.height - 1, clientY - rect.top));

      const col = Math.floor((relX / rect.width) * 7);
      const row = Math.floor((relY / rect.height) * 7);

      if (row === 0 && col === 3) return "NORTH";
      if (row === 6 && col === 3) return "SOUTH";
      if (col === 0 && row === 3) return "WEST";
      if (col === 6 && row === 3) return "EAST";
      return null;
    }

    function tileFromAsciiTap(clientX, clientY) {
      const rect = asciiOutputEl.getBoundingClientRect();
      if (!rect.width || !rect.height) return null;

      const relX = Math.max(0, Math.min(rect.width - 1, clientX - rect.left));
      const relY = Math.max(0, Math.min(rect.height - 1, clientY - rect.top));

      const x = Math.floor((relX / rect.width) * 7);
      const y = Math.floor((relY / rect.height) * 7);
      return { x, y };
    }

    function visibleItemIdAtTile(x, y) {
      if (!window.GameRuntime || typeof GameRuntime.getCurrentRoom !== "function") return null;
      const room = GameRuntime.getCurrentRoom();
      const items = room?.items || [];
      let found = null;

      for (const entry of items) {
        if (!Array.isArray(entry) || !Array.isArray(entry[1])) continue;
        const id = entry[0];
        const coord = entry[1];
        if (coord[0] !== x || coord[1] !== y) continue;

        const def = (typeof ITEM_DEFS !== "undefined") ? ITEM_DEFS[id] : null;
        if (def?.visible === false) continue;
        found = id;
      }

      return found;
    }

    function commandNounForItem(itemId) {
      const def = (typeof ITEM_DEFS !== "undefined") ? ITEM_DEFS[itemId] : null;
      if (Array.isArray(def?.synonyms) && def.synonyms.length > 0) return def.synonyms[0];
      if (def?.name) return String(def.name).toLowerCase();
      return String(itemId || "").toLowerCase();
    }

    cmd.disabled = false;
    sendBtn.disabled = false;
    cmd.focus();

    sendBtn.addEventListener("click", run);
    helpBtn.addEventListener("click", () => runRawCommand("HELP"));

    bgmToggleBtn.addEventListener("click", () => {
      if (window.GameRuntime && typeof GameRuntime.toggleBgm === "function") {
        GameRuntime.toggleBgm();
        updateAudioToggleLabels();
      }
    });

    sfxToggleBtn.addEventListener("click", () => {
      if (window.GameRuntime && typeof GameRuntime.toggleSfx === "function") {
        GameRuntime.toggleSfx();
        updateAudioToggleLabels();
      }
    });

    cmd.addEventListener("keydown", (e) => {
      if (e.key === "Enter") run();
    });

    asciiOutputEl.addEventListener("pointerdown", (e) => {
      const tile = tileFromAsciiTap(e.clientX, e.clientY);
      if (tile) {
        const itemId = visibleItemIdAtTile(tile.x, tile.y);
        if (itemId) {
          e.preventDefault();
          const def = (typeof ITEM_DEFS !== "undefined") ? ITEM_DEFS[itemId] : null;
          const noun = commandNounForItem(itemId);
          if (def?.portable) runRawCommand(`TAKE ${noun}`);
          else runRawCommand(`LOOK ${noun}`);
          return;
        }
      }

      const dir = directionFromAsciiGapTap(e.clientX, e.clientY);
      if (!dir) return;
      e.preventDefault();
      runRawCommand(`GO ${dir}`);
    });

    window.addEventListener("keydown", (e) => {
      if (e.defaultPrevented || e.altKey || e.ctrlKey || e.metaKey) return;
      if (document.activeElement === cmd && cmd.value.trim().length > 0) return;

      const dirByKey = {
        ArrowUp: "NORTH",
        ArrowDown: "SOUTH",
        ArrowLeft: "WEST",
        ArrowRight: "EAST",
      };

      const dir = dirByKey[e.key];
      if (!dir) return;

      e.preventDefault();
      runRawCommand(`GO ${dir}`);
    });

    window.addEventListener("resize", () => {
      sizeMapSquare();
      fitAsciiToMapSquare();
    });

    if (window.GameRuntime && typeof GameRuntime.renderRoom === "function") {
      GameRuntime.renderRoom(say);
      updateRoomTile();
      updateAudioToggleLabels();
      say("");
    } else {
      sendBtn.disabled = true;
      helpBtn.disabled = true;
      bgmToggleBtn.disabled = true;
      sfxToggleBtn.disabled = true;
      say("GameRuntime not loaded. Check that game_core.js and game_commands.js are included and error-free.");
    }
  </script>
</body>
</html>
